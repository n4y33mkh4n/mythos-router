name: Release

# ─────────────────────────────────────────────────────────────
# Release pipeline for mythos-router.
#
# Triggers:
#   • Pushing a tag matching v*  (e.g. `git push origin v1.9.0`)
#     publishes the version under the `next` dist-tag by default
#     and creates a GitHub Release.
#   • workflow_dispatch lets a maintainer choose the dist-tag
#     explicitly (next / latest / beta) for a re-publish.
#
# Promotion to @latest is a separate, explicit workflow:
# `.github/workflows/release-promote.yml`.
#
# Required secrets:
#   • NPM_TOKEN  — automation token from npmjs.com
#
# Provenance:
#   `npm publish --provenance` requires `id-token: write` so the
#   workflow can request an OIDC token used to sign the npm
#   provenance attestation.
# ─────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag to publish under'
        required: true
        default: 'next'
        type: choice
        options:
          - next
          - latest
          - beta

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
      - name: CHANGELOG has an entry for this version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qE "^## \[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing an entry '## [${TAG_VERSION}]'"
            exit 1
          fi

  pack-smoke:
    name: Tarball Smoke Test
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Pack
        id: pack
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --silent | tail -n 1)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
      - name: Install the actual tarball in a temp dir and exercise the CLI
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          cd "$TMP"
          npm init -y > /dev/null
          npm install "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tarball }}"
          ./node_modules/.bin/mythos --version
          ./node_modules/.bin/mythos --help | grep -q "Usage: mythos"
          # doctor exits non-zero when critical checks fail (e.g. no API key).
          # The smoke test only validates that the binary produces well-formed output.
          ./node_modules/.bin/mythos doctor --json > doctor.json || true
          node -e "const d=require('./doctor.json'); if(!Array.isArray(d.checks)||d.checks.length<6){process.exit(1)}"
      - uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to npm
    needs: pack-smoke
    runs-on: ubuntu-latest
    # Provenance requires an OIDC token; contents:write lets the
    # follow-up release job create a GitHub Release.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Resolve dist-tag
        id: tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.dist-tag }}" ]; then
            echo "tag=${{ inputs.dist-tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=next" >> "$GITHUB_OUTPUT"
          fi
      - name: npm publish (with provenance)
        run: npm publish --provenance --access public --tag "${{ steps.tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v tag="$TAG_VERSION" '
            $0 ~ "^## \\[" tag "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::warning::No release notes extracted from CHANGELOG.md — falling back to auto-generated notes."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.fallback == 'false' && 'release_notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.fallback == 'true' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
