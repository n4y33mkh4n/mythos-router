name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build & Test (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Node 20 exercises the graceful-degradation path (no node:sqlite).
        # Node 22 & 24 exercise the full feature set.
        node: [20, 22, 24]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run Tests
        run: npm test

  pack-smoke:
    name: Tarball Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Pack
        id: pack
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --silent | tail -n 1)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
      - name: Install the actual tarball and run the binary
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          cd "$TMP"
          npm init -y > /dev/null
          npm install "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tarball }}"
          ./node_modules/.bin/mythos --version
          ./node_modules/.bin/mythos --help | grep -q "Usage: mythos"
          # doctor exits non-zero when critical checks fail (e.g. no API key).
          # The smoke test only validates that the binary produces well-formed output.
          ./node_modules/.bin/mythos doctor --json > doctor.json || true
          node -e "const d=require('./doctor.json'); if(!Array.isArray(d.checks)||d.checks.length<6){process.exit(1)}"
